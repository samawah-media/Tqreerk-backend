name: Deploy — Production

on:
  push:
    branches: ["production"]
    paths:
      - "Tqreerk-backend/**"
      - "Tqreerk-backend.sln"
      - "Dockerfile"
      - ".github/workflows/deploy-production.yml"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
  SERVICE: taqreerk-backend-prod
  IMAGE: taqreerk-backend

jobs:
  build-and-deploy:
    name: Build, Push & Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build check
        run: dotnet build Tqreerk-backend.sln -c Release

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Generate migration bundle
        run: |
          dotnet ef migrations bundle \
            --project Tqreerk-backend/Tqreerk-backend.csproj \
            --configuration Release \
            --output ./efbundle \
            --self-contained \
            --target-runtime linux-x64 \
            --force

      - name: Install Cloud SQL Auth Proxy
        run: |
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.11.4/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Start Cloud SQL Auth Proxy
        run: |
          ./cloud-sql-proxy --port 5432 "${{ secrets.GCP_CLOUDSQL_CONNECTION_NAME }}" &
          echo $! > proxy.pid
          for i in $(seq 1 30); do
            if (echo >/dev/tcp/127.0.0.1/5432) 2>/dev/null; then
              echo "Cloud SQL Auth Proxy is ready."
              exit 0
            fi
            sleep 1
          done
          echo "Cloud SQL Auth Proxy failed to start."
          exit 1

      - name: Apply EF migrations
        env:
          # Pass via env (not script substitution) so special chars in the
          # password — ', $, ", backtick — don't break shell parsing.
          DATABASE_URL_PRODUCTION: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: |
          LOCAL_CONN=$(printf '%s' "$DATABASE_URL_PRODUCTION" \
            | sed -e 's/Host=[^;]*/Host=127.0.0.1/' \
                  -e 's/SSL Mode=[^;]*/SSL Mode=Disable/')
          ./efbundle --connection "$LOCAL_CONN"

      - name: Stop Cloud SQL Auth Proxy
        if: always()
        run: |
          if [ -f proxy.pid ]; then
            kill "$(cat proxy.pid)" 2>/dev/null || true
          fi

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Pull the previous prod-latest image so Docker has cached layers to
      # reuse — see deploy-staging.yml for the rationale. Saves ~2-4 min of
      # .NET restore on warm-cache builds.
      - name: Pull cached image
        run: |
          docker pull ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:prod-latest \
            || echo "no previous image at prod-latest — first cold build"

      - name: Build Docker image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker build \
            --cache-from=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:prod-latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:prod-latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:prod-latest

      - name: Deploy to Cloud Run (Production)
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          # flags format: PROJECT_ID:REGION:INSTANCE_NAME for Cloud SQL Auth Proxy
          # NOTE: HTTP/2 is intentionally NOT toggled here. See the matching
          # comment in deploy-staging.yml — verify h2c works on staging first
          # via `gcloud run services update --use-http2`, then add the flag
          # back to both workflows.
          flags: >-
            --allow-unauthenticated
            --port=8080
            --memory=2Gi
            --cpu=1
            --cpu-boost
            --min-instances=0
            --max-instances=5
            --timeout=300
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}
            --add-cloudsql-instances=${{ secrets.GCP_CLOUDSQL_CONNECTION_NAME }}
          env_vars: |
            ASPNETCORE_ENVIRONMENT=Production
            Kestrel__EndpointDefaults__Protocols=Http1AndHttp2
            ConnectionStrings__DefaultConnection=${{ secrets.DATABASE_URL_PRODUCTION }}
            JwtSettings__SecretKey=${{ secrets.JWT_SECRET }}
            JwtSettings__Issuer=Taqreerk
            JwtSettings__Audience=Taqreerk.Client
            JwtSettings__AccessTokenExpiryMinutes=15
            JwtSettings__RefreshTokenExpiryDays=7
            Sentry__Dsn=${{ secrets.SENTRY_DSN }}
            Sentry__Environment=Production
            FileStorage__Provider=gcs
            FileStorage__GcsBucketName=${{ secrets.CLOUD_STORAGE_BUCKET }}
            FileStorage__GcsPublicBucketName=${{ secrets.CLOUD_STORAGE_PUBLIC_BUCKET }}
            AiService__BaseUrl=https://taqreerk-ai-service-prod-912038409401.me-central1.run.app/api/ai
            AiService__TimeoutSeconds=300
            AiService__WorkerPollSeconds=5
            AiService__TranslationOutputPrefix=gs://taqreerk-uploads/taqreerk-uploads-dev/translations
            Gemini__ProjectId=${{ env.PROJECT_ID }}
            Gemini__Region=global
            AllowedOrigins__0=https://user-app-production-912038409401.me-central1.run.app
            AllowedOrigins__1=https://admin-dashboard-production-912038409401.me-central1.run.app
            Quota__Enabled=true
            Quota__DailyIngestPerOrg=50
            Quota__DailyTranslatePerOrg=25
            Quota__DailyChatPerUser=300

      - name: Show production URL
        run: echo "Production deployed → ${{ steps.deploy.outputs.url }}"

      - name: Verify deployment & migration
        run: |
          URL="${{ steps.deploy.outputs.url }}/healthz/"
          echo "Polling $URL ..."
          for i in $(seq 1 10); do
            RESPONSE=$(curl -s -o /tmp/health.json -w "%{http_code}" "$URL")
            echo "Attempt $i → HTTP $RESPONSE: $(cat /tmp/health.json)"
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Deployment healthy — migrations applied."
              exit 0
            fi
            sleep 6
          done
          echo "❌ Health check failed after 10 attempts."
          exit 1
